<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Sertal Ads</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#111;
      color:#fff;
      padding:40px 20px;
      overflow-x:hidden;
    }

    .wrapper{
      max-width:1400px;
      margin:auto;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
      font-weight:900;
      letter-spacing:-1px;
    }

    p{
      color:#999;
      margin-bottom:40px;
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:24px;
    }

    .card{
      position:relative;
      background:#1b1b1b;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
      transition:
        transform .25s ease,
        border-color .25s ease,
        box-shadow .25s ease;
      text-decoration:none;
      color:#fff;
      cursor:pointer;
      text-align:left;
      font:inherit;
      display:block;
      width:100%;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:#ffb71b;
      box-shadow:0 20px 40px rgba(0,0,0,.35);
    }

    .card:focus-visible{
      outline:2px solid #ffb71b;
      outline-offset:3px;
    }

    body.modal-open{
      overflow:hidden;
    }

    .preview{
      width:100%;
      height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b0b0b;
      padding:20px;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,.78);
      z-index:30;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
    }

    .modal-backdrop.is-open{
      opacity:1;
      pointer-events:auto;
    }

    .modal-panel{
      width:auto;
      max-width:calc(100vw - 24px);
      max-height:calc(100vh - 24px);
      background:#161616;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 30px 80px rgba(0,0,0,.55);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transform:translateY(10px);
      transition:transform .25s ease;
      align-self:center;
    }

    .modal-backdrop.is-open .modal-panel{
      transform:translateY(0);
    }

    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 20px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .modal-title-group h2{
      margin:0;
      font-size:22px;
      font-weight:800;
    }

    .modal-subtitle{
      margin:6px 0 0;
      color:#b9b9b9;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1.4px;
    }

    .modal-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .modal-badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:8px 10px;
      font-size:11px;
      font-weight:800;
      letter-spacing:1px;
      text-transform:uppercase;
      background:rgba(255,183,27,.16);
      color:#ffd67f;
      border:1px solid rgba(255,183,27,.22);
    }

    .modal-close{
      border:none;
      border-radius:999px;
      width:34px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      background:#2a2a2a;
      color:#fff;
      font-size:16px;
    }


    .modal-body{
      padding:16px;
      background:#0e0e0e;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:auto;
    }

    .modal-frame{
      min-height:140px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      padding:12px;
      overflow:hidden;
      max-width:100%;
      max-height:100%;
      box-sizing:border-box;
    }

    .modal-frame iframe{
      display:block;
      border:none;
      border-radius:0px;
      background:#fff;
      box-shadow:0 24px 60px rgba(0,0,0,.45);
      max-width:100%;
      max-height:100%;
      overflow:hidden;
      /* Eliminar scroll interno */
      width:auto;
      height:auto;
    }

    /*
      CARD VISUAL
    */

    .fake-ad{
      width:180px;
      height:180px;
      border-radius:18px;
      overflow:hidden;
      position:relative;
      border:2px solid rgba(255,255,255,.15);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:18px;
      isolation:isolate;
      background:#ffb71b;
    }

    /*
      IMAGEN BLUREADA
    */

    .bg-image{
      position:absolute;
      inset:0;
      background:url('./preview.jpg') center center / cover no-repeat;
      filter:blur(1px);
      transform:scale(1.15);
      opacity:.9;
      z-index:0;
    }

    /*
      OVERLAY ROJO
    */

    .overlay{
      position:absolute;
      inset:0;


      mix-blend-mode:multiply;
      z-index:1;
    }

    /*
      SILUETA PROPORCIONAL
    */

    .ratio{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border:2px dashed rgba(255,255,255,.4);
      border-radius:10px;
      z-index:2;
      pointer-events:none;
    }

    /*
      CONTENIDO
    */

    .brand,
    .title,
    .cta{
      position:relative;
      z-index:3;
    }

    .brand{
      font-size:13px;
      font-weight:700;
      letter-spacing:2px;
      opacity:.95;
    }

    .title{
      font-size:26px;
      line-height:.95;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:-1px;
    }

    .cta{
      align-self:flex-start;
      background:#fff;
      color:#ffb71b;
      padding:8px 14px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      letter-spacing:1px;
    }

    .info{
      padding:18px;
    }

    .size{
      font-size:22px;
      font-weight:800;
      margin-bottom:8px;
    }

    .open{
      font-size:14px;
      color:#ffb71b;
    }

  </style>
</head>

<body>

  <div class="wrapper">

    <h1>Sertal Ads</h1>

    <p>
      Tarjeta Roja
    </p>

    <div class="grid" id="grid"></div>

  </div>

  <div class="modal-backdrop" id="preview-modal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div class="modal-title-group">
          <p class="modal-subtitle">Preview del banner</p>
          <h2 id="modal-title">Selecciona un banner</h2>
        </div>
        <div class="modal-actions">
          <span class="modal-badge" id="modal-size">--</span>
          <button type="button" class="modal-close" id="close-modal" aria-label="Cerrar preview">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-frame">
          <iframe id="preview-frame" title="Preview del banner" loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>

    const sizes = [
      "1000x540",
      "1200x400",
      "1300x250",
      "200x500",
      "240x600",
      "300x250",
      "300x600",
      "320x100",
      "728x90",
      "750x300",
      "800x600",
      "900x400",
      "970x250",
      "970x90"
    ];

    const grid = document.getElementById('grid');
    const previewModal = document.getElementById('preview-modal');
    const previewFrame = document.getElementById('preview-frame');
    const modalTitle = document.getElementById('modal-title');
    const modalSize = document.getElementById('modal-size');
    const closeModalButton = document.getElementById('close-modal');

    let currentPreview = null;


    function fitFrameSize(width, height) {
      const maxWidth = Math.min(width, window.innerWidth - 56);
      const maxHeight = Math.min(height, window.innerHeight - 220);
      const scale = Math.min(1, maxWidth / width, maxHeight / height);
      return {
        width: `${Math.round(width * scale)}px`,
        height: `${Math.round(height * scale)}px`
      };
    }

    function openPreview(size, width, height) {
      currentPreview = { size, width, height };
      const fitted = fitFrameSize(width, height);

      previewFrame.src = `./${size}/index.html`;
      previewFrame.style.width = fitted.width;
      previewFrame.style.height = fitted.height;
      previewFrame.scrolling = 'no';
      modalTitle.textContent = `${size} preview`;
      modalSize.textContent = `${width} × ${height}`;
      previewModal.classList.add('is-open');
      previewModal.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
    }

    function closePreview() {
      previewModal.classList.remove('is-open');
      previewModal.setAttribute('aria-hidden', 'true');
      previewFrame.src = 'about:blank';
      document.body.classList.remove('modal-open');
      currentPreview = null;
    }

    closeModalButton.addEventListener('click', closePreview);

    previewModal.addEventListener('click', (event) => {
      if (event.target === previewModal) {
        closePreview();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && previewModal.classList.contains('is-open')) {
        closePreview();
      }
    });

    window.addEventListener('resize', () => {
      if (!currentPreview) return;

      const fitted = fitFrameSize(currentPreview.width, currentPreview.height);
      previewFrame.style.width = fitted.width;
      previewFrame.style.height = fitted.height;
    });

    sizes.forEach(size => {

      const [w,h] = size.split('x').map(Number);

      /*
        ESCALA SOLO LA SILUETA
      */

      const scale = 130 / Math.max(w,h);

      const ratioW = w * scale;
      const ratioH = h * scale;

      const card = document.createElement('button');

      card.type = 'button';
      card.className = 'card';

      card.innerHTML = `
      
        <div class="preview">

          <div class="fake-ad">

            <div class="bg-image"></div>

            <div class="overlay"></div>

            <div 
              class="ratio"
              style="
                width:${ratioW}px;
                height:${ratioH}px;
              "
            ></div>

            <div class="brand">
              SERTAL
            </div>

            <div class="title">
              Tarjeta<br>
              Roja
            </div>

            <div class="cta">
              VER AD
            </div>

          </div>

        </div>

        <div class="info">

          <div class="size">
            ${size}
          </div>

          <div class="open">
            Ver preview →
          </div>

        </div>

      `;

      card.addEventListener('click', () => {
        openPreview(size, w, h);
      });

      grid.appendChild(card);

    });

  </script>

</body>
</html>
